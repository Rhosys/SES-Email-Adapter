name: site
on:
  push:
    paths:
      - "site/**"
  pull_request:
    paths:
      - "site/**"
jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test
