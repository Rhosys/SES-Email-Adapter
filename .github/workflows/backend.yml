name: backend
on:
  push:
    paths:
      - "src/**"
      - "package.json"
      - "tsconfig.json"
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "tsconfig.json"
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build
      - run: npm test
